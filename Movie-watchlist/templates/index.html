<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discover — Media Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3a;
            --purple: #7c3aed;
            --purple-light: #9d5ff3;
            --purple-glow: rgba(124, 58, 237, 0.3);
            --text: #f0f0f5;
            --muted: #6b6b80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            animation: pageFadeIn 0.3s ease forwards;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            height: 60px;
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--purple-light);
            margin-right: auto;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        nav a:hover, nav a.active {
            color: var(--text);
            border-bottom-color: var(--purple);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 50px 30px;
            position: relative;
            z-index: 1;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            letter-spacing: 3px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Mode tabs */
        .mode-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--surface);
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .mode-tab {
            padding: 8px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            background: transparent;
            color: var(--muted);
            transition: all 0.2s;
        }

        .mode-tab.active {
            background: var(--purple);
            color: white;
            box-shadow: 0 0 20px var(--purple-glow);
        }

        /* Search section */
        #search-section { }

        .toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--surface);
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .toggle button {
            padding: 8px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            background: transparent;
            color: var(--muted);
            transition: all 0.2s;
        }

        .toggle button.active {
            background: var(--purple);
            color: white;
            box-shadow: 0 0 20px var(--purple-glow);
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-bar input {
            flex: 1;
            padding: 14px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px var(--purple-glow);
        }

        .search-bar input::placeholder { color: var(--muted); }

        .btn-primary {
            padding: 14px 28px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary:hover {
            background: var(--purple-light);
            box-shadow: 0 0 25px var(--purple-glow);
            transform: translateY(-1px);
        }

        /* Trending section */
        #trending-section { display: none; }

        .trending-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--surface);
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .trending-toggle button {
            padding: 8px 22px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            background: transparent;
            color: var(--muted);
            transition: all 0.2s;
        }

        .trending-toggle button.active {
            background: var(--purple);
            color: white;
            box-shadow: 0 0 20px var(--purple-glow);
        }

        /* Results grid */
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 18px;
        }

        .movie-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.25s;
            opacity: 0;
            animation: cardPop 0.3s ease forwards;
        }

        @keyframes cardPop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: var(--purple);
            box-shadow: 0 10px 40px rgba(124, 58, 237, 0.2);
        }

        .card-poster-wrap {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }

        .card-poster-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .movie-card:hover .card-poster-wrap img { transform: scale(1.04); }

        .movie-card-no-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .card-info { padding: 10px 12px 12px; }

        .card-info p {
            font-size: 12px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            color: var(--muted);
            font-size: 11px !important;
            margin-bottom: 8px !important;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .add-btn {
            width: 100%;
            padding: 7px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .add-btn:hover { background: var(--purple-light); }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 16px; }

        .trending-rank {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--purple);
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <nav>
        <span class="nav-logo">MEDIA HUB</span>
        <a href="/">Home</a>
        <a href="/discover" class="active">Discover</a>
        <a href="/watchlist-page">Watchlist</a>
        <a href="/stats">Stats</a>
    </nav>

    <div class="container">
        <h1 class="page-title" id="page-title">DISCOVER</h1>
        <p class="page-subtitle" id="page-subtitle">Search for movies, TV shows and anime</p>

        <!-- Mode tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" onclick="setMode('search')">🔍 Search</button>
            <button class="mode-tab" onclick="setMode('trending')">🔥 Trending</button>
        </div>

        <!-- Search section -->
        <div id="search-section">
            <div class="toggle">
                <button class="active" id="btn-movie" onclick="setType('movie')">🎬 Movies</button>
                <button id="btn-tv" onclick="setType('tv')">📺 TV Shows</button>
                <button id="btn-anime" onclick="setType('anime')">⛩️ Anime</button>
            </div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search for a movie...">
                <button class="btn-primary" onclick="searchMedia()">Search</button>
            </div>
        </div>

        <!-- Trending section -->
        <div id="trending-section">
            <div class="trending-toggle">
                <button class="active" id="trend-movie" onclick="loadTrending('movie')">🎬 Movies</button>
                <button id="trend-tv" onclick="loadTrending('tv')">📺 TV Shows</button>
                <button id="trend-anime" onclick="loadTrending('anime')">⛩️ Anime</button>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        let currentType = "movie";
        let currentMode = "search";
        let currentTrendType = "movie";

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
            event.target.classList.add("active");

            const searchSection = document.getElementById("search-section");
            const trendingSection = document.getElementById("trending-section");
            const title = document.getElementById("page-title");
            const subtitle = document.getElementById("page-subtitle");

            if (mode === "search") {
                searchSection.style.display = "block";
                trendingSection.style.display = "none";
                title.textContent = "DISCOVER";
                subtitle.textContent = "Search for movies, TV shows and anime";
                document.getElementById("results").innerHTML = "";
            } else {
                searchSection.style.display = "none";
                trendingSection.style.display = "block";
                title.textContent = "TRENDING";
                subtitle.textContent = "What's popular this week";
                loadTrending(currentTrendType);
            }
        }

        function setType(type) {
            currentType = type;
            document.getElementById("btn-movie").classList.toggle("active", type === "movie");
            document.getElementById("btn-tv").classList.toggle("active", type === "tv");
            document.getElementById("btn-anime").classList.toggle("active", type === "anime");
            document.getElementById("results").innerHTML = "";
            const placeholders = {
                movie: "Search for a movie...",
                tv: "Search for a TV show...",
                anime: "Search for an anime..."
            };
            document.getElementById("search-input").placeholder = placeholders[type];
        }

        async function searchMedia() {
            const query = document.getElementById("search-input").value;
            if (!query.trim()) return;

            const container = document.getElementById("results");
            container.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><p>Searching...</p></div>`;

            const response = await fetch(`/search?q=${query}&type=${currentType}`);
            const items = await response.json();
            renderCards(items, false);
        }

        async function loadTrending(type) {
            currentTrendType = type;
            document.getElementById("trend-movie").classList.toggle("active", type === "movie");
            document.getElementById("trend-tv").classList.toggle("active", type === "tv");
            document.getElementById("trend-anime").classList.toggle("active", type === "anime");

            const container = document.getElementById("results");
            container.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><p>Loading...</p></div>`;

            const response = await fetch(`/api/trending/${type}`);
            const items = await response.json();
            renderCards(items, true);
        }

        function renderCards(items, showRank) {
            const container = document.getElementById("results");
            container.innerHTML = "";

            if (items.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No results found</p></div>`;
                return;
            }

            items.forEach((item, i) => {
                const card = document.createElement("div");
                card.className = "movie-card";
                card.style.animationDelay = `${i * 0.03}s`;
                card.innerHTML = `
                    <a href="/details?type=${item.media_type}&id=${item.tmdb_id}" style="text-decoration:none;">
                        <div class="card-poster-wrap">
                            ${item.poster && item.poster !== 'None'
                                ? `<img src="${item.poster}" alt="${item.title}">`
                                : `<div class="movie-card-no-poster">🎬</div>`}
                            ${showRank ? `<div class="trending-rank">#${i + 1}</div>` : ""}
                        </div>
                    </a>
                    <div class="card-info">
                        <p title="${item.title}"><strong>${item.title}</strong></p>
                        <p class="card-meta">
                            ${item.year ? item.year : ""}
                            ${item.rating ? `⭐ ${item.rating}` : ""}
                        </p>
                        <button class="add-btn" onclick="addMedia(${item.tmdb_id}, '${item.title.replace(/'/g, "\\'")}', '${item.poster}', '${item.media_type}')">+ Add</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function addMedia(tmdb_id, title, poster, media_type) {
            const response = await fetch("/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ tmdb_id, title, poster, media_type })
            });
            const result = await response.json();
            alert(result.message);
        }

        document.getElementById("search-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchMedia();
        });
    </script>
</body>
</html>
