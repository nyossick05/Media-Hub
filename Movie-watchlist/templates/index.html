<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Watchlist</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #111; color: #fff; }
        h1 { color: #e50914; }
        input { padding: 10px; width: 70%; font-size: 16px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #e50914; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .results { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .movie-card { background: #222; border-radius: 8px; padding: 10px; width: 140px; text-align: center; }
        .movie-card img { width: 120px; height: 180px; object-fit: cover; border-radius: 5px; }
        .movie-card p { font-size: 13px; margin: 5px 0; }
        .add-btn { background: #e50914; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>🎬 Movie Watchlist</h1>
    <input type="text" id="search-input" placeholder="Search for a movie...">
    <button onclick="searchMovies()">Search</button>
    <div class="results" id="results"></div>

    <script>
        async function searchMovies() {
            const query = document.getElementById("search-input").value;
            const response = await fetch(`/search?q=${query}`);
            const movies = await response.json();

            const container = document.getElementById("results");
            container.innerHTML = "";

            movies.forEach(movie => {
                const card = document.createElement("div");
                card.className = "movie-card";
                card.innerHTML = `
                    ${movie.poster ? `<img src="${movie.poster}" alt="${movie.title}">` : "🎬"}
                    <p><strong>${movie.title}</strong></p>
                    <p>${movie.year}</p>
                    <button class="add-btn" onclick="addMovie(${movie.tmdb_id}, '${movie.title.replace(/'/g, "\\'")}', '${movie.poster}')">+ Add</button>
                `;
                container.appendChild(card);
            });
        }

        async function addMovie(tmdb_id, title, poster) {
    const response = await fetch("/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tmdb_id, title, poster })
    });
    const result = await response.json();
    alert(result.message);
}

        document.getElementById("search-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchMovies();
        });
    </script>
</body>
<nav>
    <a href="/">🔍 Search</a>
    <a href="/watchlist-page">📋 My Watchlist</a>
</nav>
</html>
