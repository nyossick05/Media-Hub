<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3a;
            --purple: #7c3aed;
            --purple-light: #9d5ff3;
            --purple-glow: rgba(124, 58, 237, 0.3);
            --text: #f0f0f5;
            --muted: #6b6b80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            height: 60px;
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--purple-light);
            margin-right: auto;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        nav a:hover, nav a.active {
            color: var(--text);
            border-bottom-color: var(--purple);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 50px 30px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            letter-spacing: 3px;
            line-height: 1;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px var(--purple-glow);
        }

        .search-bar input::placeholder { color: var(--muted); }

        .filters-wrapper {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

        .filter-btns { display: flex; flex-wrap: wrap; gap: 6px; }

        .filter-btns button {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            background: transparent;
            color: var(--muted);
            transition: all 0.2s;
        }

        .filter-btns button.active {
            background: var(--purple);
            border-color: var(--purple);
            color: white;
            box-shadow: 0 0 15px var(--purple-glow);
        }

        .filter-btns button:hover:not(.active) {
            border-color: var(--purple);
            color: var(--text);
        }

        .sort-select {
            padding: 6px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.25s;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: var(--purple);
            box-shadow: 0 10px 40px rgba(124, 58, 237, 0.2);
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .movie-card-no-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .card-info { padding: 12px; }

        .card-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .card-info select,
        .card-info input,
        .card-info textarea {
            width: 100%;
            margin-bottom: 6px;
            padding: 6px 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            outline: none;
            transition: border-color 0.2s;
        }

        .card-info select:focus,
        .card-info input:focus,
        .card-info textarea:focus {
            border-color: var(--purple);
        }

        .card-info textarea { resize: vertical; min-height: 55px; }

        .save-btn {
            width: 100%;
            padding: 7px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            transition: all 0.2s;
        }

        .save-btn:hover { background: var(--purple-light); }

        .delete-btn {
            width: 100%;
            padding: 7px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 7px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            transition: all 0.2s;
        }

        .delete-btn:hover { border-color: #ef4444; color: #ef4444; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 16px; }
    </style>
</head>
<body>
    <nav>
        <span class="nav-logo">MEDIA HUB</span>
        <a href="/">Search</a>
        <a href="/watchlist-page" class="active">Watchlist</a>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">MY WATCHLIST</h1>
        </div>

        <div class="search-bar">
            <input type="text" id="watchlist-search" placeholder="Search your watchlist..." oninput="applyFilters()">
        </div>

        <div class="filters-wrapper">
            <div class="filter-group">
                <span class="filter-label">Type</span>
                <div class="filter-btns">
                    <button class="active" id="type-all" onclick="filterType('all', this)">All</button>
                    <button id="type-movie" onclick="filterType('movie', this)">🎬 Movies</button>
                    <button id="type-tv" onclick="filterType('tv', this)">📺 TV</button>
                    <button id="type-anime" onclick="filterType('anime', this)">⛩️ Anime</button>
                </div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Status</span>
                <div class="filter-btns">
                    <button class="active" id="status-all" onclick="filterStatus('all', this)">All</button>
                    <button onclick="filterStatus('plan_to_watch', this)">Plan to Watch</button>
                    <button onclick="filterStatus('watching', this)">Watching</button>
                    <button onclick="filterStatus('watched', this)">Watched</button>
                    <button onclick="filterStatus('completed', this)">Completed</button>
                    <button onclick="filterStatus('dropped', this)">Dropped</button>
                </div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Sort</span>
                <div class="filter-btns">
                    <select class="sort-select" id="sort-select" onchange="applyFilters()">
                        <option value="date">Date Added</option>
                        <option value="title">Title A-Z</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="movies-grid" id="movies-container"></div>
    </div>

    <script>
        let allMovies = [];
        let activeType = "all";
        let activeStatus = "all";

        const movieStatuses = [
            { value: "plan_to_watch", label: "Plan to Watch" },
            { value: "watched", label: "Watched" }
        ];

        const tvAnimeStatuses = [
            { value: "plan_to_watch", label: "Plan to Watch" },
            { value: "watching", label: "Watching" },
            { value: "completed", label: "Completed" },
            { value: "dropped", label: "Dropped" }
        ];

        async function loadWatchlist() {
            const response = await fetch("/watchlist");
            allMovies = await response.json();
            applyFilters();
        }

        function filterType(type, btn) {
            activeType = type;
            document.querySelectorAll("#type-all, #type-movie, #type-tv, #type-anime").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            applyFilters();
        }

        function filterStatus(status, btn) {
            activeStatus = status;
            document.querySelectorAll("#status-all, .filter-btns button:not([id])").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById("watchlist-search").value.toLowerCase();
            const sort = document.getElementById("sort-select").value;
            let filtered = [...allMovies];

            if (activeType !== "all") filtered = filtered.filter(m => m.media_type === activeType);
            if (activeStatus !== "all") filtered = filtered.filter(m => m.status === activeStatus);
            if (query) filtered = filtered.filter(m => m.title.toLowerCase().includes(query));

            if (sort === "title") filtered.sort((a, b) => a.title.localeCompare(b.title));
            else if (sort === "rating") filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));

            renderMovies(filtered);
        }

        function renderMovies(movies) {
            const container = document.getElementById("movies-container");
            container.innerHTML = "";

            if (movies.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><p>Nothing here yet!</p></div>`;
                return;
            }

            movies.forEach(movie => {
                const statuses = movie.media_type === "movie" ? movieStatuses : tvAnimeStatuses;
                const statusOptions = statuses.map(s =>
                    `<option value="${s.value}" ${movie.status === s.value ? "selected" : ""}>${s.label}</option>`
                ).join("");

                const card = document.createElement("div");
                card.className = "movie-card";
                card.innerHTML = `
                    <a href="/details?type=${movie.media_type}&id=${movie.tmdb_id}">
                        ${movie.poster && movie.poster !== 'None'
                            ? `<img src="${movie.poster}" alt="${movie.title}">`
                            : `<div class="movie-card-no-poster">🎬</div>`}
                    </a>
                    <div class="card-info">
                        <a href="/details?type=${movie.media_type}&id=${movie.tmdb_id}" style="text-decoration:none; color:inherit;">
                            <p class="card-title" title="${movie.title}">${movie.title}</p>
                        </a>
                        <span class="badge">${movie.media_type === "movie" ? "🎬 Movie" : movie.media_type === "tv" ? "📺 TV" : "⛩️ Anime"}</span>
                        <select id="status-${movie.id}">${statusOptions}</select>
                        <input type="number" id="rating-${movie.id}" min="1" max="10" placeholder="Rating /10" value="${movie.rating || ""}">
                        <textarea id="review-${movie.id}" placeholder="Your review...">${movie.review || ""}</textarea>
                        <button class="save-btn" onclick="updateMovie(${movie.id})">Save</button>
                        <button class="delete-btn" onclick="deleteMovie(${movie.id})">Remove</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateMovie(id) {
            const status = document.getElementById(`status-${id}`).value;
            const rating = document.getElementById(`rating-${id}`).value;
            const review = document.getElementById(`review-${id}`).value;
            const response = await fetch("/update", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id, status, rating, review })
            });
            const result = await response.json();
            alert(result.message);
        }

        async function deleteMovie(id) {
            if (!confirm("Remove this from your watchlist?")) return;
            const response = await fetch("/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id })
            });
            const result = await response.json();
            alert(result.message);
            loadWatchlist();
        }

        loadWatchlist();
    </script>
</body>
</html>
