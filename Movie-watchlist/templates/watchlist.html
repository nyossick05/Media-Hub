<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        #modal-overlay {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
        }
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3a;
            --purple: #7c3aed;
            --purple-light: #9d5ff3;
            --purple-glow: rgba(124, 58, 237, 0.3);
            --text: #f0f0f5;
            --muted: #6b6b80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            animation: pageFadeIn 0.3s ease forwards;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            height: 60px;
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--purple-light);
            margin-right: auto;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        nav a:hover, nav a.active {
            color: var(--text);
            border-bottom-color: var(--purple);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 30px;
            position: relative;
            z-index: 1;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            letter-spacing: 3px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px var(--purple-glow);
        }

        .search-bar input::placeholder { color: var(--muted); }

        .filters-wrapper {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
        .filter-btns { display: flex; flex-wrap: wrap; gap: 6px; }

        .filter-btns button {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            background: transparent;
            color: var(--muted);
            transition: all 0.2s;
        }

        .filter-btns button.active {
            background: var(--purple);
            border-color: var(--purple);
            color: white;
            box-shadow: 0 0 15px var(--purple-glow);
        }

        .filter-btns button:hover:not(.active) {
            border-color: var(--purple);
            color: var(--text);
        }

        .sort-select {
            padding: 6px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 14px;
        }

        .movie-card {
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
            opacity: 0;
            animation: cardPop 0.3s ease forwards;
        }

        @keyframes cardPop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .movie-card:hover {
            transform: translateY(-4px);
            border-color: var(--purple);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.2);
        }

        .poster-wrap {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }

        .poster-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .movie-card:hover .poster-wrap img { transform: scale(1.04); }

        .poster-no-img {
            width: 100%;
            height: 100%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .status-strip { height: 3px; width: 100%; }
        .status-watched { background: #22c55e; }
        .status-completed { background: #22c55e; }
        .status-watching { background: #3b82f6; }
        .status-plan_to_watch { background: #f59e0b; }
        .status-dropped { background: #ef4444; }

        .card-info { padding: 8px 10px 10px; }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
        }

        .badge {
            display: inline-block;
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 20px;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            z-index: 1001;
        }

        .modal-header {
            display: flex;
            gap: 16px;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-poster {
            width: 70px;
            min-width: 70px;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 8px;
        }

        .modal-poster-placeholder {
            width: 70px;
            min-width: 70px;
            aspect-ratio: 2/3;
            background: var(--surface2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .modal-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--purple);
            color: white;
            display: inline-block;
            margin-bottom: 8px;
        }

        .modal-body { padding: 20px; }

        .modal-body label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            margin-top: 14px;
        }

        .modal-body label:first-child { margin-top: 0; }

        .modal-body select,
        .modal-body textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-body select:focus,
        .modal-body textarea:focus { border-color: var(--purple); }

        .modal-body textarea { resize: vertical; min-height: 80px; }

        .modal-stars {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .modal-star {
            font-size: 22px;
            cursor: pointer;
            color: var(--border);
            transition: color 0.15s, transform 0.1s;
        }

        .modal-star:hover,
        .modal-star.filled { color: #fbbf24; }

        .modal-star:hover { transform: scale(1.2); }

        .modal-footer {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .btn-save {
            flex: 1;
            padding: 11px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-save:hover { background: var(--purple-light); }

        .btn-delete {
            padding: 11px 16px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 9px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-delete:hover { border-color: #ef4444; color: #ef4444; }

        .btn-details {
            padding: 11px 16px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 9px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .btn-details:hover { border-color: var(--purple); color: var(--purple-light); }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 16px; }
    </style>
</head>
<body>
    <nav>
        <span class="nav-logo">MEDIA HUB</span>
        <a href="/">Home</a>
        <a href="/discover">Search</a>
        <a href="/watchlist-page" class="active">Watchlist</a>
        <a href="/stats">Stats</a>
    </nav>

    <div class="container">
        <h1 class="page-title">MY WATCHLIST</h1>

        <div class="search-bar">
            <input type="text" id="watchlist-search" placeholder="Search your watchlist..." oninput="applyFilters()">
        </div>

        <div class="filters-wrapper">
            <div class="filter-group">
                <span class="filter-label">Type</span>
                <div class="filter-btns">
                    <button class="active" id="type-all" onclick="filterType('all', this)">All</button>
                    <button id="type-movie" onclick="filterType('movie', this)">🎬 Movies</button>
                    <button id="type-tv" onclick="filterType('tv', this)">📺 TV</button>
                    <button id="type-anime" onclick="filterType('anime', this)">⛩️ Anime</button>
                </div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Status</span>
                <div class="filter-btns">
                    <button class="active" id="status-all" onclick="filterStatus('all', this)">All</button>
                    <button onclick="filterStatus('plan_to_watch', this)">Plan to Watch</button>
                    <button onclick="filterStatus('watching', this)">Watching</button>
                    <button onclick="filterStatus('watched', this)">Watched</button>
                    <button onclick="filterStatus('completed', this)">Completed</button>
                    <button onclick="filterStatus('dropped', this)">Dropped</button>
                </div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Sort</span>
                <div class="filter-btns">
                    <select class="sort-select" id="sort-select" onchange="applyFilters()">
                        <option value="date">Date Added</option>
                        <option value="title">Title A-Z</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="movies-grid" id="movies-container"></div>
    </div>

    <div id="modal-overlay" style="display:none;" onclick="closeModal(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <div id="modal-poster-container"></div>
                <div>
                    <div class="modal-title" id="modal-title"></div>
                    <span class="modal-badge" id="modal-badge"></span>
                </div>
            </div>
            <div class="modal-body">
                <label>Status</label>
                <select id="modal-status"></select>
                <label>Your Rating</label>
                <div class="modal-stars" id="modal-stars"></div>
                <label>Review</label>
                <textarea id="modal-review" placeholder="Write your review..."></textarea>
            </div>
            <div class="modal-footer">
                <a href="#" id="modal-details-btn" class="btn-details">Info</a>
                <button class="btn-delete" onclick="deleteMovie()">Remove</button>
                <button class="btn-save" onclick="saveMovie()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let allMovies = [];
        let activeType = "all";
        let activeStatus = "all";
        let currentMovie = null;
        let currentRating = 0;

        const movieStatuses = [
            { value: "plan_to_watch", label: "Plan to Watch" },
            { value: "watched", label: "Watched" }
        ];

        const tvAnimeStatuses = [
            { value: "plan_to_watch", label: "Plan to Watch" },
            { value: "watching", label: "Watching" },
            { value: "completed", label: "Completed" },
            { value: "dropped", label: "Dropped" }
        ];

        async function loadWatchlist() {
            // Show skeleton while loading
            const container = document.getElementById("movies-container");
            container.innerHTML = Array(12).fill(`
                <div style="background:var(--surface); border-radius:10px; border:1px solid var(--border); overflow:hidden; opacity:0.5;">
                    <div style="aspect-ratio:2/3; background:var(--surface2);"></div>
                    <div style="padding:10px;">
                        <div style="height:10px; background:var(--surface2); border-radius:4px; margin-bottom:8px;"></div>
                        <div style="height:10px; background:var(--surface2); border-radius:4px; width:60%;"></div>
                </div>
            </div>
    `).join("");

    const response = await fetch("/watchlist");
    allMovies = await response.json();
    applyFilters();
}

        function filterType(type, btn) {
            activeType = type;
            document.querySelectorAll("#type-all, #type-movie, #type-tv, #type-anime").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            applyFilters();
        }

        function filterStatus(status, btn) {
            activeStatus = status;
            document.querySelectorAll("#status-all, .filter-btns button:not([id])").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById("watchlist-search").value.toLowerCase();
            const sort = document.getElementById("sort-select").value;
            let filtered = [...allMovies];

            if (activeType !== "all") filtered = filtered.filter(m => m.media_type === activeType);
            if (activeStatus !== "all") filtered = filtered.filter(m => m.status === activeStatus);
            if (query) filtered = filtered.filter(m => m.title.toLowerCase().includes(query));
            if (sort === "title") filtered.sort((a, b) => a.title.localeCompare(b.title));
            else if (sort === "rating") filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));

            renderMovies(filtered);
        }

        function renderMovies(movies) {
            const container = document.getElementById("movies-container");
            container.innerHTML = "";

            if (movies.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><p>Nothing here yet!</p></div>`;
                return;
            }

            movies.forEach((movie, i) => {
                const card = document.createElement("div");
                card.className = "movie-card";
                card.style.animationDelay = `${i * 0.04}s`;
                card.onclick = () => openModal(movie);
                card.innerHTML = `
                    <a href="/details?type=${movie.media_type}&id=${movie.tmdb_id}" onclick="event.stopPropagation()">
                        <div class="poster-wrap">
                            ${movie.poster && movie.poster !== 'None'
                                ? `<img src="${movie.poster}" alt="${movie.title}">`
                                : `<div class="poster-no-img">🎬</div>`}
                        </div>
                    </a>
                    <div class="status-strip status-${movie.status}"></div>
                    <div class="card-info">
                        <p class="card-title" title="${movie.title}">${movie.title}</p>
                        <p style="font-size: 11px; color: #fbbf24; margin-bottom: 4px;">${movie.rating ? `⭐ ${movie.rating}/10` : `<span style="color:var(--muted)">No rating</span>`}</p>
                        <span class="badge">${movie.media_type === "movie" ? "🎬" : movie.media_type === "tv" ? "📺" : "⛩️"}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openModal(movie) {
            currentMovie = movie;
            currentRating = movie.rating || 0;
            document.body.style.overflow = 'hidden';

            document.getElementById("modal-title").textContent = movie.title;
            document.getElementById("modal-badge").textContent =
                movie.media_type === "movie" ? "🎬 Movie" : movie.media_type === "tv" ? "📺 TV Show" : "⛩️ Anime";

            const posterContainer = document.getElementById("modal-poster-container");
            if (movie.poster && movie.poster !== 'None') {
                posterContainer.innerHTML = `<img src="${movie.poster}" class="modal-poster" alt="${movie.title}">`;
            } else {
                posterContainer.innerHTML = `<div class="modal-poster-placeholder">🎬</div>`;
            }

            const statuses = movie.media_type === "movie" ? movieStatuses : tvAnimeStatuses;
            document.getElementById("modal-status").innerHTML = statuses
                .map(s => `<option value="${s.value}" ${movie.status === s.value ? "selected" : ""}>${s.label}</option>`)
                .join("");

            renderModalStars(currentRating);
            document.getElementById("modal-review").value = movie.review || "";
            document.getElementById("modal-details-btn").href = `/details?type=${movie.media_type}&id=${movie.tmdb_id}`;

            const overlay = document.getElementById("modal-overlay");
            overlay.style.cssText = "display:flex; position:fixed; top:0; left:0; width:100%; height:100%; align-items:center; justify-content:center; padding:20px; background:rgba(0,0,0,0.75); z-index:9999;";
            window.scrollTo({top: 0, behavior: 'smooth'});        }

        function renderModalStars(rating) {
            const container = document.getElementById("modal-stars");
            container.innerHTML = "";
            for (let i = 1; i <= 10; i++) {
                const star = document.createElement("span");
                star.className = `modal-star ${i <= rating ? "filled" : ""}`;
                star.textContent = "★";
                star.onmouseover = () => highlightStars(i);
                star.onmouseout = () => renderModalStars(currentRating);
                star.onclick = () => { currentRating = i; renderModalStars(i); };
                container.appendChild(star);
            }
        }

        function highlightStars(n) {
            document.querySelectorAll(".modal-star").forEach((s, i) => {
                s.classList.toggle("filled", i < n);
            });
        }

        function closeModal(e) {
            if (e.target.id === "modal-overlay") {
                document.body.style.overflow = '';
                document.getElementById("modal-overlay").style.display = "none";
            }
        }

        async function saveMovie() {
            document.body.style.overflow = '';
            const scrollPos = window.scrollY;
            const status = document.getElementById("modal-status").value;
            const review = document.getElementById("modal-review").value;
            const response = await fetch("/update", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: currentMovie.id, status, rating: currentRating || null, review })
            });
            document.getElementById("modal-overlay").style.display = "none";
            await loadWatchlist();
            window.scrollTo(0, scrollPos);
        }

        async function deleteMovie() {
            document.body.style.overflow = '';
            if (!confirm("Remove this from your watchlist?")) return;
            await fetch("/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: currentMovie.id })
            });
            document.getElementById("modal-overlay").style.display = "none";
            loadWatchlist();
        }

        loadWatchlist();
    </script>
</body>
</html>
