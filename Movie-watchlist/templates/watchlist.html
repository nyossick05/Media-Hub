<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Watchlist</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #111; color: #fff; }
        h1 { color: #e50914; }
        nav a { color: #e50914; text-decoration: none; margin-right: 20px; font-size: 16px; }
        .filters { margin: 20px 0; }
        .filters button { padding: 8px 16px; margin-right: 10px; border: none; border-radius: 5px; cursor: pointer; background: #333; color: #fff; margin-bottom: 8px; }
        .filters button.active { background: #e50914; }
        .movies { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .movie-card { background: #222; border-radius: 8px; padding: 15px; width: 160px; text-align: center; }
        .movie-card img { width: 140px; height: 200px; object-fit: cover; border-radius: 5px; }
        .movie-card p { font-size: 13px; margin: 5px 0; }
        .badge { background: #333; font-size: 11px; padding: 2px 6px; border-radius: 10px; }
        select, textarea, input[type=number] { width: 100%; margin-top: 5px; padding: 5px; background: #333; color: #fff; border: none; border-radius: 4px; font-size: 12px; }
        .save-btn { background: #e50914; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; margin-top: 8px; width: 100%; }
        .delete-btn { background: #444; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; margin-top: 5px; width: 100%; }
        .empty { color: #666; margin-top: 40px; font-size: 18px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">🔍 Search</a>
        <a href="/watchlist-page">📋 My Watchlist</a>
    </nav>
    <h1>My Watchlist</h1>

    <div class="filters">
        <button class="active" onclick="filterMedia('all', this)">All</button>
        <button onclick="filterMedia('plan_to_watch', this)">Plan to Watch</button>
        <button onclick="filterMedia('watching', this)">Watching</button>
        <button onclick="filterMedia('watched', this)">Watched</button>
        <button onclick="filterMedia('completed', this)">Completed</button>
        <button onclick="filterMedia('dropped', this)">Dropped</button>
    </div>

    <div class="movies" id="movies-container"></div>

    <script>
        let allMovies = [];

        const movieStatuses = [
            { value: "plan_to_watch", label: "Plan to Watch" },
            { value: "watched", label: "Watched" }
        ];

        const tvAnimeStatuses = [
            { value: "plan_to_watch", label: "Plan to Watch" },
            { value: "watching", label: "Watching" },
            { value: "completed", label: "Completed" },
            { value: "dropped", label: "Dropped" }
        ];

        async function loadWatchlist() {
            const response = await fetch("/watchlist");
            allMovies = await response.json();
            renderMovies(allMovies);
        }

        function filterMedia(status, btn) {
            document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (status === "all") {
                renderMovies(allMovies);
            } else {
                renderMovies(allMovies.filter(m => m.status === status));
            }
        }

        function renderMovies(movies) {
            const container = document.getElementById("movies-container");
            container.innerHTML = "";

            if (movies.length === 0) {
                container.innerHTML = "<p class='empty'>Nothing here yet!</p>";
                return;
            }

            movies.forEach(movie => {
                const statuses = movie.media_type === "movie" ? movieStatuses : tvAnimeStatuses;
                const statusOptions = statuses.map(s =>
                    `<option value="${s.value}" ${movie.status === s.value ? "selected" : ""}>${s.label}</option>`
                ).join("");

                const card = document.createElement("div");
                card.className = "movie-card";
                card.innerHTML = `
                    ${movie.poster ? `<img src="${movie.poster}" alt="${movie.title}">` : "🎬"}
                    <p><strong>${movie.title}</strong></p>
                    <p><span class="badge">${movie.media_type === "movie" ? "🎬 Movie" : movie.media_type === "tv" ? "📺 TV" : "⛩️ Anime"}</span></p>
                    <select id="status-${movie.id}">${statusOptions}</select>
                    <input type="number" id="rating-${movie.id}" min="1" max="10" placeholder="Rating /10" value="${movie.rating || ""}">
                    <textarea id="review-${movie.id}" placeholder="Your review..." rows="3">${movie.review || ""}</textarea>
                    <button class="save-btn" onclick="updateMovie(${movie.id})">Save</button>
                    <button class="delete-btn" onclick="deleteMovie(${movie.id})">Remove</button>
                `;
                container.appendChild(card);
            });
        }

        async function updateMovie(id) {
            const status = document.getElementById(`status-${id}`).value;
            const rating = document.getElementById(`rating-${id}`).value;
            const review = document.getElementById(`review-${id}`).value;
            const response = await fetch("/update", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id, status, rating, review })
            });
            const result = await response.json();
            alert(result.message);
        }

        async function deleteMovie(id) {
            if (!confirm("Remove this from your watchlist?")) return;
            const response = await fetch("/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id })
            });
            const result = await response.json();
            alert(result.message);
            loadWatchlist();
        }

        loadWatchlist();
    </script>
</body>
</html>
