<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --purple: #7c3aed;
            --purple-light: #9d5ff3;
            --purple-glow: rgba(124, 58, 237, 0.4);
            --text: #f0f0f5;
            --muted: #6b6b80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Poster wall */
        .poster-wall {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            padding: 6px;
            transform: scale(1.05);
            z-index: 0;
            opacity: 0;
            animation: wallFadeIn 0.8s ease forwards 0.2s;
        }

        @keyframes wallFadeIn {
            to { opacity: 1; }
        }

        .poster-cell {
            border-radius: 8px;
            overflow: hidden;
            background: #1a1a26;
            animation: cellPop 0.4s ease backwards;
        }

        .poster-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .poster-cell:hover img { transform: scale(1.05); }

        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(10, 10, 15, 0.5) 0%,
                rgba(10, 10, 15, 0.7) 40%,
                rgba(10, 10, 15, 0.95) 100%
            );
            z-index: 1;
        }

        /* Content */
        .content {
            position: fixed;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 100px;
            letter-spacing: 8px;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, var(--purple-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s ease forwards 0.5s;
        }

        .tagline {
            font-size: 16px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
            margin-bottom: 48px;
            opacity: 0;
            transform: translateY(15px);
            animation: slideUp 0.5s ease forwards 0.7s;
        }

        .cta-group {
            display: flex;
            gap: 14px;
            opacity: 0;
            transform: translateY(15px);
            animation: slideUp 0.5s ease forwards 0.9s;
        }

        .btn-primary {
            padding: 16px 40px;
            background: var(--purple);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 0 30px var(--purple-glow);
        }

        .btn-primary:hover {
            background: var(--purple-light);
            transform: translateY(-2px);
            box-shadow: 0 0 50px var(--purple-glow);
        }

        .btn-secondary {
            padding: 16px 40px;
            background: rgba(255,255,255,0.08);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-2px);
        }

        .stats-bar {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            gap: 40px;
            opacity: 0;
            animation: slideUp 0.5s ease forwards 1.1s;
        }

        .stat-item { text-align: center; }

        .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--purple-light);
            letter-spacing: 2px;
            line-height: 1;
        }

        .stat-lbl {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 3px;
        }

        .stat-divider {
            width: 1px;
            background: rgba(255,255,255,0.1);
            align-self: stretch;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cellPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="poster-wall" id="poster-wall"></div>
    <div class="overlay"></div>

    <div class="content">
        <h1 class="logo">MEDIA HUB</h1>
        <p class="tagline">Your movies, shows & anime — all in one place</p>
        <div class="cta-group">
            <a href="/discover" class="btn-primary">Browse & Search</a>
            <a href="/watchlist-page" class="btn-secondary">My Watchlist</a>
        </div>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <script>
        // Popular movies/shows to fill the poster wall
        const TMDB_KEY = "{{ api_key }}";
        const posterIds = [
            { id: 550, type: "movie" },      // Fight Club
            { id: 238, type: "movie" },      // Godfather
            { id: 680, type: "movie" },      // Pulp Fiction
            { id: 13, type: "movie" },       // Forrest Gump
            { id: 155, type: "movie" },      // Dark Knight
            { id: 278, type: "movie" },      // Shawshank
            { id: 240, type: "movie" },      // Godfather 2
            { id: 424, type: "movie" },      // Schindlers List
            { id: 389, type: "movie" },      // 12 Angry Men
            { id: 129, type: "movie" },      // Spirited Away
            { id: 19404, type: "movie" },    // DDLJ
            { id: 372058, type: "movie" },   // Your Name
            { id: 1396, type: "tv" },        // Breaking Bad
            { id: 1399, type: "tv" },        // Game of Thrones
            { id: 66732, type: "tv" },       // Stranger Things
            { id: 1402, type: "tv" },        // Walking Dead
            { id: 94997, type: "tv" },       // House of Dragon
            { id: 60574, type: "tv" },       // Peaky Blinders
            { id: 1408, type: "tv" },        // House
            { id: 57243, type: "tv" },       // Doctor Who
            { id: 76479, type: "tv" },       // The Boys
        ];

        async function loadPosters() {
            const wall = document.getElementById("poster-wall");
            const cells = 21;
            const shuffled = [...posterIds].sort(() => Math.random() - 0.5).slice(0, cells);

            for (let i = 0; i < cells; i++) {
                const cell = document.createElement("div");
                cell.className = "poster-cell";
                cell.style.animationDelay = `${i * 0.03}s`;
                wall.appendChild(cell);
            }

            shuffled.forEach(async (item, i) => {
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/${item.type}/${item.id}?api_key=${TMDB_KEY}`);
                    const data = await res.json();
                    if (data.poster_path) {
                        const img = document.createElement("img");
                        img.src = `https://image.tmdb.org/t/p/w300${data.poster_path}`;
                        img.alt = data.title || data.name;
                        wall.children[i].appendChild(img);
                    }
                } catch(e) {}
            });
        }
        
        loadPosters();
    </script>
</body>
</html>
